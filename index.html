<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta name="theme-color" content="#111111" />

  <title>B&S Digital Profile</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="profile-card">

    <button
      id="darkModeBtn"
      class="dark-mode-btn"
      type="button"
      aria-label="Toggle dark mode"
    >
      🌙
    </button>

    <div id="loading" class="status-message">
      Loading profile...
    </div>

    <section id="profileContent" class="hidden">

      <img
        id="profileImage"
        class="profile-image"
        src="images/default.jpg"
        alt="Customer profile picture"
      />

      <h1 id="customerName"></h1>

      <p id="customerJob" class="customer-job"></p>

      <div class="buttons">

        <a
          id="whatsappBtn"
          class="profile-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          WhatsApp
        </a>

        <a
          id="instapayBtn"
          class="profile-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          InstaPay
        </a>

        <a
          id="facebookBtn"
          class="profile-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          Facebook
        </a>

        <a
          id="instagramBtn"
          class="profile-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram
        </a>

        <a
          id="tiktokBtn"
          class="profile-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          TikTok
        </a>

        <a
          id="xBtn"
          class="profile-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          X
        </a>

        <a
          id="mapsBtn"
          class="profile-btn"
          target="_blank"
          rel="noopener noreferrer"
        >
          Google Maps
        </a>

      </div>

      <footer>
        Powered by <strong>B&S</strong>
      </footer>

    </section>

    <section id="errorMessage" class="status-message hidden">
      <h2>Profile Not Found</h2>
      <p>Please check the customer link.</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
